name: ${PROJECT_NAME:-app}-deploy

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-app_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-app_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # api Backend
  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/your-repo}/api:${RELEASE_TAG:-latest}
    container_name: ${PROJECT_NAME:-app}-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@postgres:5432/${DATABASE_NAME:-app_db}
      REDIS_URL: redis://redis:6379
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${API_PORT:-4000}:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - app-network

  # tenent-dashboard Frontend
  tenent-dashboard:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/your-repo}/tenent-dashboard:${RELEASE_TAG:-latest}
    container_name: ${PROJECT_NAME:-app}-tenent-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - '${TENENT-DASHBOARD_PORT:-3000}:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/ || exit 1']
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    networks:
      - app-network

  # super-admin Frontend
  super-admin:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/your-repo}/super-admin:${RELEASE_TAG:-latest}
    container_name: ${PROJECT_NAME:-app}-super-admin
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - '${SUPER-ADMIN_PORT:-3001}:3001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/ || exit 1']
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    networks:
      - app-network

  # customer-website Frontend
  customer-website:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/your-repo}/customer-website:${RELEASE_TAG:-latest}
    container_name: ${PROJECT_NAME:-app}-customer-website
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3002
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - '${CUSTOMER-WEBSITE_PORT:-3002}:3002'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3002/ || exit 1']
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    external: true
    name: ${PROJECT_NAME:-app}-postgres-prod-data
  redis_data:
    name: ${PROJECT_NAME:-app}-redis-prod-data
