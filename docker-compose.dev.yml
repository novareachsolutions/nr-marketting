version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME:-app}-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-app_db}
    ports:
      - '${DATABASE_PORT:-5432}:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-app}-redis-dev
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # api Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-development
    container_name: ${PROJECT_NAME:-app}-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@postgres:5432/${DATABASE_NAME:-app_db}
      REDIS_URL: redis://redis:6379
    volumes:
      - ./apps/backend/api:/app/apps/backend/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/backend/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${API_PORT:-4000}:3000'
    networks:
      - app-network

  # tenent-dashboard Frontend
  tenent-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: tenent-dashboard-production
    container_name: ${PROJECT_NAME:-app}-tenent-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    volumes:
      - ./apps/frontend/tenent-dashboard:/app/apps/frontend/tenent-dashboard
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/frontend/tenent-dashboard/node_modules
      - /app/apps/frontend/tenent-dashboard/.next
    ports:
      - '${TENENT-DASHBOARD_PORT:-3000}:3000'
    networks:
      - app-network

  # super-admin Frontend
  super-admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: super-admin-production
    container_name: ${PROJECT_NAME:-app}-super-admin
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    volumes:
      - ./apps/frontend/super-admin:/app/apps/frontend/super-admin
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/frontend/super-admin/node_modules
      - /app/apps/frontend/super-admin/.next
    ports:
      - '${SUPER-ADMIN_PORT:-3001}:3001'
    networks:
      - app-network

  # customer-website Frontend
  customer-website:
    build:
      context: .
      dockerfile: Dockerfile
      target: customer-website-production
    container_name: ${PROJECT_NAME:-app}-customer-website
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    volumes:
      - ./apps/frontend/customer-website:/app/apps/frontend/customer-website
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/frontend/customer-website/node_modules
      - /app/apps/frontend/customer-website/.next
    ports:
      - '${CUSTOMER-WEBSITE_PORT:-3002}:3002'
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_dev_data:
    name: ${PROJECT_NAME:-app}-postgres-dev-data
  redis_dev_data:
    name: ${PROJECT_NAME:-app}-redis-dev-data
